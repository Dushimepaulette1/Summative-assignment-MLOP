version: "3.8"

services:
  api:
    build: .
    # We don't expose ports here because Nginx handles the outside traffic
    deploy:
      replicas: 3 # This spins up 3 identical copies of your model!

  load_balancer:
    image: nginx:latest
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8000:80" # Maps your computer's port 8000 to the Nginx traffic cop
    depends_on:
      - api
